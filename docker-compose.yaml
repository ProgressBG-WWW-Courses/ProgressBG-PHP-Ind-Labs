services:
  php85:
    build:
      context: .
      dockerfile: Dockerfile.php85
    image: php-labs:8.5
    container_name: php_labs_85
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html

  php74:
    build:
      context: .
      dockerfile: Dockerfile.php74
    image: php-labs:7.4
    container_name: php_labs_74
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html

  browser-sync:
    image: node:alpine
    container_name: php_live_reload
    network_mode: "host"
    volumes:
      - .:/source
      - ./bs-config.js:/bs-config.js
    working_dir: /source
    command: sh -c "npm install -g browser-sync && browser-sync start --config /bs-config.js"

  mariadb:
    image: mariadb:latest
    container_name: php_labs_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: labs_db
      MARIADB_USER: admin
      MARIADB_PASSWORD: admin1234
    ports:
      - "3308:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: php_labs_pma
    restart: always
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - mariadb

volumes:
  mariadb_data: